<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survival Shooter</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1a1a;
            overflow: hidden;
            touch-action: none;
        }

        canvas {
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            border-radius: 4px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>

<body>
    <script type="module">
        import BootScene from './js/scenes/BootScene.js';
        import MainMenuScene from './js/scenes/MainMenuScene.js';
        import GameScene from './js/scenes/GameScene.js';
        import StoreScene from './js/scenes/StoreScene.js';
        import GameOverScene from './js/scenes/GameOverScene.js';

        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            parent: document.body,
            backgroundColor: '#222222',
            physics: {
                default: 'arcade',
                arcade: {
                    debug: false
                }
            },
            scale: {
                mode: Phaser.Scale.RESIZE,
                autoCenter: Phaser.Scale.CENTER_BOTH
            },
            scene: [BootScene, MainMenuScene, GameScene, StoreScene, GameOverScene],
            canvasStyle: 'display: block; width: 100%; height: 100%;'
        };

        const game = new Phaser.Game(config);
    </script>
</body>

</html>
